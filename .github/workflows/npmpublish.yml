name: Node.js Package

on:
  workflow_call:

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - name: Upgrade npm to >=11.5.1 (required for trusted publishing)
        run: npm install -g npm@latest
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: npm ci
      - run: npm test
      - name: Bump version (patch)
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0) || exit 1
          NEW_COMMITS=$(git rev-list --count "${LATEST_TAG}"..) || exit 1
          [ "${NEW_COMMITS}" -gt 0 ] || exit 0
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          npm version patch
          NEW_TAG="v$(node -p "require('./package.json').version")"
          # Use --atomic so branch + tag succeed or fail together.
          # If a concurrent run already pushed this tag, the push fails
          # cleanly and the next run will retry.
          git push --atomic origin "${GITHUB_REF_NAME}" "${NEW_TAG}"
      - name: Publish to npm via OIDC
        run: |
          # Only publish if the version bump succeeded (tag was pushed)
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view ep_plugin_helpers version 2>/dev/null || echo "none")
          if [ "${CURRENT_VERSION}" = "${PUBLISHED}" ]; then
            echo "Version ${CURRENT_VERSION} already published, skipping"
            exit 0
          fi
          npm publish --provenance --access public
