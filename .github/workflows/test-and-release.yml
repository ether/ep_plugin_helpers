name: Node.js Package
on: [push]

permissions:
  contents: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm ci
      - run: npm test
  release:
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: test
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/npmpublish.yml
    secrets: inherit
